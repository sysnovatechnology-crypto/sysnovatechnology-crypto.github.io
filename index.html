<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lavori in Corso</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Barlow:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --yellow: #FFD000;
      --black: #111111;
      --orange: #FF6B00;
      --white: #F5F5F0;
      --stripe-size: 60px;
    }
 
    * { margin: 0; padding: 0; box-sizing: border-box; }
 
    body {
      background-color: var(--black);
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
 
    /* Strisce animate in alto e in basso */
    .stripe-bar {
      position: fixed;
      left: 0; right: 0;
      height: 28px;
      background: repeating-linear-gradient(
        -45deg,
        var(--yellow) 0px,
        var(--yellow) var(--stripe-size),
        var(--black) var(--stripe-size),
        var(--black) calc(var(--stripe-size) * 2)
      );
      background-size: calc(var(--stripe-size) * 2) 100%;
      animation: moveStripes 1.2s linear infinite;
      z-index: 10;
    }
    .stripe-bar.top { top: 0; }
    .stripe-bar.bottom { bottom: 0; }
 
    @keyframes moveStripes {
      from { background-position: 0 0; }
      to { background-position: calc(var(--stripe-size) * 2) 0; }
    }
 
    /* Contenuto centrale */
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      text-align: center;
      padding: 40px 24px;
      animation: fadeIn 1s ease both;
    }
 
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
 
    /* Scena cantiere con emoji animate */
    .scene {
      font-size: 3.5rem;
      display: flex;
      gap: 16px;
      align-items: flex-end;
      height: 80px;
    }
 
    .cone {
      display: inline-block;
      animation: bounce 0.6s ease-in-out infinite alternate;
    }
    .cone:nth-child(1) { animation-delay: 0s; }
    .cone:nth-child(3) { animation-delay: 0.2s; }
    .cone:nth-child(5) { animation-delay: 0.4s; }
 
    @keyframes bounce {
      from { transform: translateY(0px); }
      to   { transform: translateY(-14px); }
    }
 
    .excavator {
      display: inline-block;
      font-size: 4rem;
      animation: digger 1.5s ease-in-out infinite;
      transform-origin: bottom center;
    }
 
    @keyframes digger {
      0%, 100% { transform: rotate(-8deg); }
      50%       { transform: rotate(8deg); }
    }
 
    .helmet {
      display: inline-block;
      font-size: 3rem;
      animation: nod 1s ease-in-out infinite alternate;
    }
 
    @keyframes nod {
      from { transform: rotate(-10deg); }
      to   { transform: rotate(10deg); }
    }
 
    /* Titolo principale */
    .title {
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(2.8rem, 10vw, 6rem);
      line-height: 1;
      color: var(--yellow);
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 4px 4px 0px var(--orange);
    }
 
    /* Sottotitolo lampeggiante */
    .subtitle {
      font-size: clamp(1rem, 3vw, 1.4rem);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 6px;
      color: var(--white);
      animation: blink 1.1s step-start infinite;
    }
 
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
 
    /* Barra progresso */
    .progress-wrap {
      width: min(420px, 90vw);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
 
    .progress-label {
      font-size: 0.8rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--yellow);
      text-align: left;
    }
 
    .progress-track {
      height: 16px;
      background: #333;
      border-radius: 8px;
      overflow: hidden;
      border: 2px solid #444;
    }
 
    .progress-fill {
      height: 100%;
      width: 0%;
      background: repeating-linear-gradient(
        -45deg,
        var(--yellow) 0px,
        var(--yellow) 8px,
        var(--orange) 8px,
        var(--orange) 16px
      );
      background-size: 22px 100%;
      border-radius: 8px;
      animation:
        fillBar 4s ease-out 0.5s forwards,
        moveStripes 0.4s linear infinite;
    }
 
    @keyframes fillBar {
      from { width: 0%; }
      to   { width: 68%; }
    }
 
    /* Messaggio */
    .message {
      font-size: 1rem;
      color: #aaa;
      max-width: 380px;
      line-height: 1.6;
    }
 
    /* Badge */
    .badge {
      background: var(--yellow);
      color: var(--black);
      font-family: 'Black Han Sans', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 3px;
      padding: 8px 20px;
      border-radius: 4px;
      text-transform: uppercase;
      animation: pulse 2s ease-in-out infinite;
    }
 
    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,208,0,0.4); }
      50%       { transform: scale(1.04); box-shadow: 0 0 0 10px rgba(255,208,0,0); }
    }
 
    /* Particelle di polvere */
    .dust {
      position: fixed;
      bottom: 30px;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255, 208, 0, 0.5);
      animation: riseDust 3s ease-in infinite;
      pointer-events: none;
    }
 
    @keyframes riseDust {
      0%   { transform: translateY(0) scale(1); opacity: 0.6; }
      100% { transform: translateY(-80vh) scale(0); opacity: 0; }
    }
  </style>
</head>
<body>
 
  <div class="stripe-bar top"></div>
  <div class="stripe-bar bottom"></div>
 
  <div class="container">
 
    <div class="scene">
      <span class="cone">🚧</span>
      <span class="excavator">🚜</span>
      <span class="cone">🚧</span>
      <span class="helmet">👷</span>
      <span class="cone">🚧</span>
    </div>
 
    <div class="title">Lavori<br>in Corso</div>
 
    <div class="subtitle">⚠ Sito in costruzione ⚠</div>
 
    <div class="progress-wrap">
      <div class="progress-label">Avanzamento lavori</div>
      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>
    </div>
 
    <p class="message">
      Stiamo costruendo qualcosa di fantastico.<br>
      Torna presto per scoprirlo! 🔨
    </p>
 
    <div class="badge">🏗️ Coming Soon</div>
 
  </div>
 
  <!-- Particelle di polvere -->
  <script>
    for (let i = 0; i < 10; i++) {
      const d = document.createElement('div');
      d.className = 'dust';
      d.style.left = Math.random() * 100 + 'vw';
      d.style.animationDelay = (Math.random() * 3) + 's';
      d.style.animationDuration = (2.5 + Math.random() * 2) + 's';
      d.style.width = d.style.height = (5 + Math.random() * 8) + 'px';
      document.body.appendChild(d);
    }
  </script>
 
</body>
</html>
